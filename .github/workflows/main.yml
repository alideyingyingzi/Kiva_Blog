name: Deploy Hexo to Cloudflare Pages

on:
  push:
    branches:
      - main  # 如果你的默认分支是 master，请改成 master
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true # 重要：如果你的主题是用 git submodule 引入的，必须开启
          fetch-depth: 0   # 获取所有历史提交，方便 hexo 生成时间戳

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Hexo 推荐 Node 18 或 20

      - name: Install Dependencies
        run: npm install

      - name: Generate Static Files
        run: npx hexo generate # 或者用 hexo g

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=kivablog --branch=main
          # 注意：上面的 '你的CloudflarePages项目名称' 要换成你在 Cloudflare 后台创建的项目名字
